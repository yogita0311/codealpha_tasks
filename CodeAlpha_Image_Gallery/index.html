<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css" />
<script src="https://kit.fontawesome.com/73c6378472.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="wrapper">
<h1>Image Gallery</h1>
<div class="gallery">
<div class="image"><span><img src="dog.jpeg" alt=""></span></div>
<div class="image"><span><img src="duck.jpg" alt=""></span></div>
<div class="image"><span><img src="butterfly.jpg" alt=""></span></div>
<div class="image"><span><img src="rabbit.jpg" alt=""></span></div>
<div class="image"><span><img src="squirrel.jpg" alt=""></span></div>
<div class="image"><span><img src="parrot.jpg" alt=""></span></div>
<div class="image"><span><img src="peacock.jpg" alt=""></span></div>
<div class="image"><span><img src="cat.jpg" alt=""></span></div>
</div>
</div>
<div class="preview-box">
<div class="details">
<span class="title">
Image <p class="current-img">3</p>
of <p class="total-img">6</p>
</span>
<span class="icon fa-solid fa-xmark"></span>
</div>
<div class="img-box">
<div class="slide prev">
<i class="fa-solid fa-angle-left"></i>
</div>
<div class="slide next">
<i class="fa-solid fa-angle-right"></i>
</div>
<img src="" alt="">
</div>
</div>
</div>
<div class="shadow"></div>
<script src="main.js"></script>
</body>
</html>
